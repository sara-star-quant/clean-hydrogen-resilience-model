# Deploy the project's static site to GitHub Pages.
# Publishes docs/ as the landing page, plus the playground from playground/, into a
# single Pages site at https://sara-star-quant.github.io/clean-hydrogen-resilience-model/.

name: pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: assemble site
        run: |
          mkdir -p _site
          cp -r docs/. _site/
          cp -r playground _site/playground

      - name: upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
